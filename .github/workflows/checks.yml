name: checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Match the Cloudflare Pages build environment exactly, so anything that
      # passes CI is guaranteed to pass in deploy. Bump both versions here and
      # in Cloudflare's env vars in lockstep.
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24.10.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Astro type/schema check
        run: pnpm check

      - name: Snippet reference integrity
        run: pnpm verify-snippets

      - name: Build
        run: pnpm build
        env:
          ASTRO_TELEMETRY_DISABLED: "1"
